# @package _global_
problem:
  runner: SOnRunner
  manifold: SOn
  mat_dim: 10
  dataset: SO10_3w

training:
  hidden_layers: [1024, 1024, 1024, 1024, 1024]
  batch_size: 128
  n_epochs: 2000
  update_training_set_path_freq: 5

optim:
  lr: 0.0005
  ema: 0.9999
  scheduler:
    factor: 0.5
    patience: 200
    threshold: 1.0e-04
    threshold_mode: rel
    mode: min
    cooldown: 0
    min_lr: 5.0e-06
    eps: 1.0e-08
    warmup_epochs: 0

model:
  sigma_schedule_overdamped: geometric
  sigma_min_overdamped: 0.2
  sigma_max_overdamped: 2.0

  sigma_schedule_underdamped: geometric
  sigma_min_underdamped: 0.2
  sigma_max_underdamped: 2.0

  T_underdamped: 2.5
  T_overdamped: 1.0

  N_overdamped: 100
  N_underdamped: 50

sample:
  sample_num: 10000
  sampler_gamma : 10.0
  sampler_OLLA_alpha: 50.0
  sampler_ULLA_alpha: 15.0
  projection_mode_olla: explicit
  projection_mode_ulla: explicit
