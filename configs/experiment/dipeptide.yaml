# @package _global_
problem:
  runner: MDRunner
  manifold: MD
  dataset: dipeptide
  psi_windows_low: 130
  psi_windows_high: 170

training:
  hidden_layers: [1024, 1024, 1024, 1024, 1024]
  network_mode: EMLP
  batch_size: 1024
  n_epochs: 2000
  update_training_set_path_freq: 10
  kappa: 50.

optim:
  lr: 0.002
  ema: 0.999
  scheduler:
    factor: 0.6
    patience: 100
    threshold: 5.0e-05
    threshold_mode: rel
    mode: min
    cooldown: 50
    min_lr: 1.0e-05
    eps: 1.0e-08
    warmup_epochs: 0

model:
  sigma_schedule_overdamped: linear
  sigma_min_overdamped: 1.0
  sigma_max_overdamped: 1.0

  sigma_schedule_underdamped: linear
  sigma_min_underdamped: 0.5
  sigma_max_underdamped: 2.0

  T_underdamped: 0.2
  T_overdamped: 0.1

  N: 100

sample:
  sample_num: 8000
  sampler: ULLA
  sampler_gamma : 10.0
  sampler_OLLA_alpha : 75.0
  sampler_ULLA_alpha : 50.0
  epsilon : 0.05
  projection_mode_olla: implicit
  projection_mode_ulla: explicit
